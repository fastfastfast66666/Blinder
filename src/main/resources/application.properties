spring.application.name=bishe10-backend
spring.config.import=optional:file:${user.dir}/application-local.properties
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.mvc.async.request-timeout=180000

bishe10.storage.root-dir=${BISHE10_STORAGE_DIR:${user.dir}/runtime-data}
bishe10.auth.db.url=${BISHE10_DB_URL:jdbc:mysql://localhost:3306/bishe10?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=10000&socketTimeout=30000&tcpKeepAlive=true}
bishe10.auth.db.username=${BISHE10_DB_USERNAME:bishe10_app}
bishe10.auth.db.password=${BISHE10_DB_PASSWORD:}
bishe10.auth.code-ttl-seconds=${BISHE10_AUTH_CODE_TTL_SECONDS:300}
bishe10.auth.code-resend-cooldown-seconds=${BISHE10_AUTH_CODE_RESEND_COOLDOWN_SECONDS:45}
bishe10.auth.token-ttl-days=${BISHE10_AUTH_TOKEN_TTL_DAYS:30}
bishe10.auth.code-pepper=${BISHE10_AUTH_CODE_PEPPER:bishe10-local-code-pepper}
bishe10.auth.mail.enabled=${BISHE10_MAIL_ENABLED:true}
bishe10.auth.mail.host=${BISHE10_MAIL_HOST:smtp.qq.com}
bishe10.auth.mail.port=${BISHE10_MAIL_PORT:465}
bishe10.auth.mail.username=${BISHE10_MAIL_USERNAME:}
bishe10.auth.mail.password=${BISHE10_MAIL_PASSWORD:}
bishe10.auth.mail.from=${BISHE10_MAIL_FROM:}
bishe10.auth.mail.sender-name=${BISHE10_MAIL_SENDER_NAME:Bishe10}
bishe10.auth.mail.ssl-enabled=${BISHE10_MAIL_SSL_ENABLED:true}
bishe10.auth.mail.timeout-ms=${BISHE10_MAIL_TIMEOUT_MS:10000}
bishe10.admin.default-username=${BISHE10_ADMIN_USERNAME:admin}
bishe10.admin.default-password=${BISHE10_ADMIN_PASSWORD:}
bishe10.admin.default-nickname=${BISHE10_ADMIN_NICKNAME:\u7CFB\u7EDF\u7BA1\u7406\u5458}
bishe10.admin.token-ttl-hours=${BISHE10_ADMIN_TOKEN_TTL_HOURS:12}
bishe10.llm.enabled=${BISHE10_LLM_ENABLED:true}
bishe10.llm.base-url=${BISHE10_LLM_BASE_URL:https://api.deepseek.com/v1}
bishe10.llm.api-key=${BISHE10_LLM_API_KEY:}
bishe10.llm.model=${BISHE10_LLM_MODEL:deepseek-chat}
bishe10.llm.provider-label=${BISHE10_LLM_PROVIDER_LABEL:DeepSeek}
bishe10.llm.timeout-seconds=${BISHE10_LLM_TIMEOUT_SECONDS:60}
bishe10.llm.vision-base-url=${BISHE10_VISION_LLM_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
bishe10.llm.vision-api-key=${BISHE10_VISION_LLM_API_KEY:}
bishe10.llm.vision-model=${BISHE10_VISION_LLM_MODEL:glm-4v-flash}
bishe10.llm.vision-provider-label=${BISHE10_VISION_LLM_PROVIDER_LABEL:GLM-4V-Flash}
bishe10.llm.vision-timeout-seconds=${BISHE10_VISION_LLM_TIMEOUT_SECONDS:55}
bishe10.tts.enabled=${BISHE10_TTS_ENABLED:true}
bishe10.tts.python-bin=${BISHE10_TTS_PYTHON:python}
bishe10.tts.script-path=${BISHE10_TTS_SCRIPT:F:/Blinder/bishe10-backend-configured/backend/scripts/tts_edge.py}
bishe10.tts.voice=${BISHE10_TTS_VOICE:zh-CN-XiaoxiaoNeural}
bishe10.tts.provider-label=${BISHE10_TTS_PROVIDER_LABEL:Edge TTS}
bishe10.tts.timeout-seconds=${BISHE10_TTS_TIMEOUT_SECONDS:30}
bishe10.location.enabled=${BISHE10_LOCATION_ENABLED:true}
bishe10.location.provider-label=${BISHE10_LOCATION_PROVIDER_LABEL:Tencent Maps}
bishe10.location.base-url=${BISHE10_LOCATION_BASE_URL:https://apis.map.qq.com/ws/geocoder/v1}
bishe10.location.api-key=${BISHE10_LOCATION_API_KEY:}
bishe10.location.default-city=${BISHE10_LOCATION_DEFAULT_CITY:\u4E0A\u6D77}
bishe10.location.timeout-seconds=${BISHE10_LOCATION_TIMEOUT_SECONDS:6}
bishe10.news.enabled=${BISHE10_NEWS_ENABLED:true}
bishe10.news.provider-label=${BISHE10_NEWS_PROVIDER_LABEL:Baidu News Search}
bishe10.news.base-url=${BISHE10_NEWS_BASE_URL:https://www.baidu.com/s}
bishe10.news.api-key=${BISHE10_NEWS_API_KEY:}
bishe10.news.timeout-seconds=${BISHE10_NEWS_TIMEOUT_SECONDS:8}
bishe10.news.max-per-query=${BISHE10_NEWS_MAX_PER_QUERY:12}
bishe10.weather.enabled=${BISHE10_WEATHER_ENABLED:true}
bishe10.weather.provider-label=${BISHE10_WEATHER_PROVIDER_LABEL:Open-Meteo}
bishe10.weather.base-url=${BISHE10_WEATHER_BASE_URL:https://api.open-meteo.com/v1/forecast}
bishe10.weather.air-quality-base-url=${BISHE10_WEATHER_AIR_QUALITY_BASE_URL:https://air-quality-api.open-meteo.com/v1/air-quality}
bishe10.weather.geocode-base-url=${BISHE10_WEATHER_GEOCODE_BASE_URL:https://geocoding-api.open-meteo.com/v1/search}
bishe10.weather.timeout-seconds=${BISHE10_WEATHER_TIMEOUT_SECONDS:15}
